# CI jobs

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    # Weekly build to make sure dependencies are OK
    - cron:  '30 16 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read_targets_from_file:
    uses: bitcraze/workflows/.github/workflows/read_build_targets.yml@cc82f0e5999c39eff964dd73ce9363e94d5b5b76
    with:
      target_file: './build_targets.json'

  basic_build:
    needs: read_targets_from_file
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ${{fromJson(needs.read_targets_from_file.outputs.platforms)}}

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: build
      run: docker run --rm -v ${PWD}:/module bitcraze/builder bash -c "make ${{ matrix.platform }}_defconfig && ./tools/build/build UNIT_TEST_STYLE=min"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.platform }}-${{ github.sha }}
        path: |
          build/${{ matrix.platform }}.bin
          build/${{ matrix.platform }}.elf

  features:
    runs-on: ubuntu-latest
    needs: basic_build

    strategy:
      fail-fast: false
      matrix:
        features:
        # Build cf2 with bosch sensors
        - bosch.conf
        # Build cf2 with TDMA
        - loco_tdma.conf
        # Build cf2 with TDOA2 positioning mode
        - loco_tdoa2.conf
        #- LPS_TDOA_ENABLE=1
        # Build cf2 with TDOA3 positioning mode
        - loco_tdoa3.conf
        #- LPS_TDOA3_ENABLE=1
        # Build cf2 with TDOA3 and all config options
        - loco_tdoa3_all.conf
        # Build Bigquad deck with all config options
        - bigquad.conf
        # Build API test app layer app
        - app_api.conf
    env:
      CONF: ${{ matrix.features }}

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: build
      run: docker run --rm -v ${PWD}:/module bitcraze/builder bash -c "./scripts/kconfig/merge_config.sh configs/${CONF} configs/defconfig && ./tools/build/build UNIT_TEST_STYLE=min"

  apps:
    runs-on: ubuntu-latest
    needs: basic_build

    strategy:
      fail-fast: false
      matrix:
        example:
        - examples/app_hello_world
        - examples/app_hello_world-cpp
        - examples/app_hello_file_tree
        - examples/app_peer_to_peer
        - examples/app_p2p_DTR
        - examples/app_stm_gap8_cpx
        - examples/demos/app_push_demo
        - examples/demos/swarm_demo
        - examples/demos/app_wall_following_demo
    env:
      EXAMPLE: ${{ matrix.example }}

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: build
      run: docker run --rm -v ${PWD}:/module bitcraze/builder bash -c "./tools/build/make_app ${EXAMPLE}"

  kbuild-targets:
    runs-on: ubuntu-latest
    needs: basic_build

    strategy:
      fail-fast: false
      matrix:
        target:
        - allyesconfig
        - allnoconfig
        - randconfig

    env:
      TARGET: ${{ matrix.target }}

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: build
      run: docker run --rm -v ${PWD}:/module bitcraze/builder bash -c "KCONFIG_ALLCONFIG=configs/all.config make ${TARGET} &&  ./tools/build/build UNIT_TEST_STYLE=min"

  static-analysis:
    runs-on: ubuntu-latest
    # Run after basic_build to ensure the codebase is clean first.
    needs: basic_build

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck

    - name: Run cppcheck
      # Analyze the application source tree.
      #
      # Suppressed categories and rationale:
      #   missingIncludeSystem - STM32/CMSIS vendor headers not on the host include path
      #   unusedFunction       - init/test functions called via pointer tables look unused
      #   unknownMacro         - PARAM_GROUP_START/STOP, LOG_GROUP_START/STOP expand to
      #                          GCC linker-section attributes; cppcheck can't parse them
      #                          without the full build system definitions
      #   syntaxError          - cascades from unknownMacro: parser gives up after an
      #                          unrecognised macro and reports syntax errors on valid code
      #   comparePointers      - linker-section table size idiom (&__stop_x - &__start_x)
      #                          is valid GNU C but cppcheck flags it as comparing pointers
      #                          to different objects
      #   invalidPointerCast   - intentional type-punning in math3d.h (fast abs/sqrt using
      #                          union-free float<->int reinterpretation, well-defined on
      #                          this target via -fno-strict-aliasing)
      #
      # --error-exitcode=1 fails the job on any finding not suppressed above.
      # Add a '// cppcheck-suppress <id>' inline comment for confirmed false positives
      # in specific call sites rather than broadening these suppressions further.
      run: |
        cppcheck \
          --error-exitcode=1 \
          --force \
          --inline-suppr \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --suppress=unknownMacro \
          --suppress=syntaxError \
          --suppress=comparePointers \
          --suppress=invalidPointerCast \
          --suppress=objectIndex \
          --suppress=invalidPrintfArgType_uint \
          --suppress=nullPointerRedundantCheck \
          --suppress=arrayIndexOutOfBoundsCond \
          --suppress=nullPointer \
          --enable=warning,performance,portability \
          -I src/modules/interface \
          -I src/hal/interface \
          -I src/drivers/interface \
          -I src/utils/interface \
          -I src/config \
          src/modules/src \
          src/hal/src \
          src/utils/src
